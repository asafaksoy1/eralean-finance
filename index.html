<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eralean Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ==== Design tokens ==== */
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-elev: #F5F4EF;
    --ink: #0A0A0A;
    --ink-muted: #6B6B68;
    --border: rgba(10,10,10,0.08);
    --border-strong: rgba(10,10,10,0.16);
    --accent: #1A4D2E;
    --accent-hover: #143d24;
    --accent-soft: #DCEEDF;
    --positive: #047857;
    --positive-soft: #D1FAE5;
    --negative: #B91C1C;
    --negative-soft: #FEE2E2;
    --warning: #B45309;
    --warning-soft: #FEF3C7;
    --shadow-sm: 0 1px 2px rgba(10,10,10,0.04);
    --shadow-md: 0 4px 12px rgba(10,10,10,0.06);
    --shadow-lg: 0 20px 60px rgba(10,10,10,0.12);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --serif: 'Inter', system-ui, sans-serif;
    --display: 'Inter', system-ui, sans-serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  [data-theme="dark"] {
    --bg: #0E0E0C;
    --surface: #161614;
    --surface-elev: #1F1F1C;
    --ink: #F5F4EF;
    --ink-muted: #9A9A95;
    --border: rgba(245,244,239,0.08);
    --border-strong: rgba(245,244,239,0.18);
    --accent: #4ADE80;
    --accent-hover: #22C55E;
    --accent-soft: #1A2F22;
    --positive: #34D399;
    --positive-soft: #1A2F22;
    --negative: #F87171;
    --negative-soft: #2F1A1A;
    --warning: #FBBF24;
    --warning-soft: #2F2310;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    color: var(--ink);
    position: relative;
    transition: background 0.2s, color 0.2s;
  }
  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.02;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible,
  [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 6px;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .num { font-variant-numeric: tabular-nums; }
  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* ==== Layout ==== */
  .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }
  .sidebar {
    width: 240px; background: var(--surface); border-right: 1px solid var(--border);
    padding: 24px 16px; display: flex; flex-direction: column; gap: 24px;
    position: sticky; top: 0; height: 100vh; flex-shrink: 0;
  }
  .brand { display: flex; align-items: baseline; padding: 4px 12px; font-size: 22px; letter-spacing: -0.03em; line-height: 1; }
  .brand-name { color: var(--ink); font-weight: 800; }
  .brand-dot { color: var(--accent); margin: 0 4px; font-weight: 800; }
  .brand-tag { color: var(--ink-muted); font-weight: 500; letter-spacing: -0.02em; font-family: var(--sans); font-size: 22px; }
  .create-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 20px; border-radius: 999px; background: var(--accent); color: #FFFFFF;
    font-weight: 600; font-size: 14px; align-self: stretch;
    transition: background 0.15s, transform 0.1s;
  }
  .create-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-radius: var(--radius-sm); color: var(--ink); font-size: 14px; font-weight: 500;
    width: 100%; text-align: left; transition: background 0.15s;
  }
  .nav-item:hover:not(.active) { background: var(--surface-elev); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); }
  .nav-item.active svg { color: var(--accent); }
  .nav-item svg { color: var(--ink-muted); flex-shrink: 0; }
  .nav-item.active svg { color: var(--accent); }
  .nav-item span { flex: 1; }

  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 0; z-index: 10;
  }
  .business-name { font-size: 22px; font-weight: 800; letter-spacing: -0.025em; }
  .top-right { display: flex; align-items: center; gap: 12px; position: relative; }
  .icon-toggle {
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted); transition: background 0.15s, color 0.15s;
  }
  .icon-toggle:hover { background: var(--surface-elev); color: var(--ink); }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; cursor: pointer; transition: transform 0.1s;
  }
  .avatar:hover { transform: scale(1.05); }
  .avatar-menu {
    position: absolute; top: 48px; right: 0; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
    padding: 8px; min-width: 240px; z-index: 50;
  }
  .avatar-menu-info { padding: 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .avatar-menu-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .avatar-menu-email { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
  .avatar-menu-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: var(--radius-sm); font-size: 14px; color: var(--ink);
    width: 100%; text-align: left; transition: background 0.15s;
  }
  .avatar-menu-item:hover { background: var(--surface-elev); }
  .avatar-menu-item.danger { color: var(--negative); }
  .avatar-menu-item.danger:hover { background: var(--negative-soft); }

  .content { padding: 32px 40px; max-width: 1400px; width: 100%; margin: 0 auto; }

  /* ==== Page headers ==== */
  .page-title { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  .page-subtitle { font-size: 14px; color: var(--ink-muted); margin-top: 6px; }
  .section-title-up { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); margin-bottom: 16px; }
  .list-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }

  /* ==== Home / balance ==== */
  .balance-wrap { margin-bottom: 32px; }
  .balance-line { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .balance-big {
    font-size: 64px; font-weight: 800;
    letter-spacing: -0.045em; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .balance-big sup, .balance-currency { font-weight: 700; }
  .balance-currency { font-size: 18px; font-weight: 700; color: var(--ink-muted); letter-spacing: -0.01em; }
  .balance-label { font-size: 14px; color: var(--ink-muted); margin-top: 12px; }
  .period-picker { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .period-select {
    padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); font-size: 14px; font-weight: 500; color: var(--ink);
    cursor: pointer; outline: none; transition: border-color 0.15s;
  }
  .period-select:hover { border-color: var(--border-strong); }
  .period-select:focus { border-color: var(--accent); }

  /* ==== Insights strip ==== */
  .insights-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 28px;
  }
  .insight-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 16px 18px; transition: border-color 0.15s, transform 0.15s;
  }
  .insight-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .insight-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .insight-emoji { font-size: 16px; }
  .insight-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted); }
  .insight-value { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .insight-sub { font-size: 12px; color: var(--ink-muted); margin-top: 4px; font-family: var(--mono); }

  /* ==== Summary cards ==== */
  .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 20px; transition: border-color 0.15s, transform 0.15s;
  }
  .summary-card:hover { border-color: var(--border-strong); }
  .summary-top { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .icon-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .summary-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted); }
  .summary-value { font-family: var(--mono); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
  .summary-sub { font-size: 12px; color: var(--ink-muted); margin-bottom: 12px; font-family: var(--mono); }
  .summary-cta { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 13px; font-weight: 600; }
  .summary-cta:hover { text-decoration: underline; }
  .breakdown-line { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-muted); margin-top: 4px; font-family: var(--mono); }
  .breakdown-line strong { font-weight: 600; color: var(--ink); }

  /* ==== Chart ==== */
  .chart-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 24px; margin-bottom: 24px;
  }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
  .chart-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .chart-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .seg-toggle { display: inline-flex; background: var(--surface-elev); border-radius: 999px; padding: 3px; }
  .seg-opt {
    padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
    color: var(--ink-muted); transition: all 0.15s;
  }
  .seg-opt.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
  .chart-wrap { position: relative; height: 360px; }
  .chart-wrap svg { width: 100%; height: 100%; overflow: visible; }
  .chart-tooltip {
    position: absolute; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px; box-shadow: var(--shadow-lg);
    pointer-events: none; opacity: 0; transition: opacity 0.15s; min-width: 200px; z-index: 5;
    font-size: 12px;
  }
  .chart-tooltip.visible { opacity: 1; }
  .chart-tooltip .tt-month { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--ink); }
  .chart-tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; font-family: var(--mono); font-size: 11px; margin-top: 3px; }
  .chart-tooltip .tt-row span:first-child { color: var(--ink-muted); }
  .chart-legend { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--ink-muted); }
  .chart-legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  /* ==== Sections ==== */
  .section {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 20px; margin-bottom: 16px;
  }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; flex-wrap: wrap; }
  .section-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  /* ==== Categories ==== */
  .category-list { display: flex; flex-direction: column; gap: 14px; }
  .category-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
  .category-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .category-amount { font-size: 13px; font-weight: 600; font-family: var(--mono); }
  .category-pct { font-size: 12px; color: var(--ink-muted); margin-left: 8px; font-family: var(--mono); }
  .bar-bg { height: 6px; background: var(--surface-elev); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

  /* ==== Tables ==== */
  .activity-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .activity-header {
    display: flex; padding: 14px 20px; background: var(--surface-elev); border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .activity-row {
    display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border);
    font-size: 14px; transition: background 0.1s;
  }
  .activity-row:last-child { border-bottom: none; }
  .activity-row:hover { background: var(--surface-elev); }
  .empty-state { padding: 60px 40px; text-align: center; color: var(--ink-muted); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .empty-state svg { opacity: 0.5; }
  .empty-state-title { font-size: 18px; font-weight: 700; color: var(--ink); margin-top: 8px; letter-spacing: -0.02em; }
  .empty-state-text { max-width: 320px; line-height: 1.5; }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-regular { background: var(--accent-soft); color: var(--accent); }
  .badge-extra { background: var(--warning-soft); color: var(--warning); }
  .category-tag { display: inline-block; padding: 4px 10px; background: var(--surface-elev); color: var(--ink); border-radius: 4px; font-size: 12px; font-weight: 500; }
  .row-actions { display: flex; justify-content: flex-end; gap: 4px; }
  .row-action { padding: 6px; border-radius: 6px; color: var(--ink-muted); display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }
  .row-action:hover { background: var(--surface-elev); color: var(--ink); }

  /* ==== Buttons / pills ==== */
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-pill {
    padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
    background: var(--surface-elev); color: var(--ink-muted); transition: all 0.15s;
  }
  .filter-pill:hover { background: var(--border); }
  .filter-pill.active { background: var(--ink); color: var(--bg); }

  .primary-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 20px; background: var(--accent); color: #FFFFFF;
    border-radius: 999px; font-size: 14px; font-weight: 600; transition: background 0.15s, transform 0.1s;
  }
  .primary-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .secondary-btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
    background: var(--surface); color: var(--ink); border: 1px solid var(--border);
    border-radius: 999px; font-size: 14px; font-weight: 600; transition: background 0.15s;
  }
  .secondary-btn:hover { background: var(--surface-elev); }

  .toggle-pill { display: flex; background: var(--surface-elev); border-radius: 999px; padding: 4px; width: 100%; }
  .toggle-option {
    flex: 1; padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
    color: var(--ink-muted); transition: all 0.15s;
  }
  .toggle-option.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

  /* ==== Modal ==== */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(10,10,10,0.5); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 480px;
    max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 22px; font-weight: 800; letter-spacing: -0.025em; }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .field { margin-bottom: 16px; }
  .field-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .field-error { font-size: 12px; color: var(--negative); margin-top: 4px; }
  .input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; color: var(--ink); background: var(--surface); outline: none;
    transition: border-color 0.15s;
  }
  .input:focus { border-color: var(--accent); }
  .input.input-error { border-color: var(--negative); }
  textarea.input { min-height: 60px; resize: vertical; }
  .icon-btn { padding: 8px; border-radius: var(--radius-sm); color: var(--ink); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .icon-btn:hover { background: var(--surface-elev); }

  /* ==== Toast stack ==== */
  .toast-stack {
    position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column;
    gap: 8px; z-index: 200; pointer-events: none;
  }
  .toast {
    background: var(--ink); color: var(--bg); padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg);
    animation: toastIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: auto;
  }
  .toast.error { background: var(--negative); color: #FFFFFF; }
  .toast.fade-out { animation: toastOut 0.2s ease forwards; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(10px) scale(0.95); } }

  /* ==== Auth (split-screen) ==== */
  .auth-page {
    min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
    background: #0A0A0A; color: #FFFFFF; position: relative; z-index: 1;
  }
  .auth-left {
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px;
    background:
      radial-gradient(ellipse 80% 60% at 30% 10%, rgba(26, 77, 46, 0.55) 0%, rgba(26, 77, 46, 0) 60%),
      radial-gradient(ellipse 70% 50% at 70% 30%, rgba(60, 130, 90, 0.35) 0%, rgba(60, 130, 90, 0) 65%),
      linear-gradient(160deg, #0F1F16 0%, #0A0A0A 70%);
  }
  .auth-left::before {
    content: ""; position: absolute; inset: 0;

  el.textContent = text;
  stack.appendChild(el);
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => el.remove(), 200);
  }, 2200);
}

/* ==== Number animation (easeOutQuart, 600ms) ==== */
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
function animateNumberInEl(el, from, to, formatter) {
  if (!el) return;
  if (from === to) { el.textContent = formatter(to); return; }
  const duration = 600;
  const start = performance.now();
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = easeOutQuart(t);
    const val = from + (to - from) * eased;
    el.textContent = formatter(val);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function runNumberAnimations() {
  document.querySelectorAll('[data-animate-num]').forEach(el => {
    const key = el.dataset.animateKey;
    const to = parseFloat(el.dataset.animateTo);
    const fmtType = el.dataset.animateFmt || 'big';
    const formatter = fmtType === 'pct' ? (v => v.toFixed(1) + '%')
                    : fmtType === 'fmt' ? fmt
                    : fmtBig;
    const from = prevDisplayValues[key] != null ? prevDisplayValues[key] : to;
    animateNumberInEl(el, from, to, formatter);
    prevDisplayValues[key] = to;
  });
}

/* ==== Data layer ==== */
async function loadAllData() {
  if (!session) return;
  try {
    const [txRes, ruleRes, debtRes, invRes, profRes, lockRes] = await Promise.all([
      sb.from('transactions').select('*').order('date', { ascending: false }),
      sb.from('recurring_rules').select('*').order('created_at', { ascending: false }),
      sb.from('debts').select('*').order('created_at', { ascending: false }),
      sb.from('investments').select('*').order('created_at', { ascending: false }),
      sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle(),
      sb.from('locked_months').select('*'),
    ]);
    if (txRes.error) throw txRes.error;
    if (debtRes.error) throw debtRes.error;
    if (invRes.error) throw invRes.error;
    // rules and locked may not exist yet — handle gracefully
    state.income = (txRes.data || []).filter(t => t.type === 'income').map(rowToTransaction);
    state.expenses = (txRes.data || []).filter(t => t.type === 'expense').map(rowToTransaction);
    state.debts = (debtRes.data || []).map(rowToDebt);
    state.investments = (invRes.data || []).map(rowToInvestment);
    state.rules = ruleRes && !ruleRes.error ? (ruleRes.data || []).map(rowToRule) : [];
    state.locked = lockRes && !lockRes.error ? (lockRes.data || []).map(r => r.month_key) : [];
    profile = profRes && profRes.data ? profRes.data : { full_name: '', currency: 'GBP' };
  } catch (e) {
    console.error('Load error:', e);
    showToast('Veri yüklenemedi: ' + e.message, true);
  }
}

/* ============================================================
   PERIOD DATA + FORECAST WITH DEBT
   ============================================================ */
function getPeriodData() {
  const periodIncome = state.income.filter(i => {
    const d = new Date(i.date);
    return d.getMonth() + 1 === period.month && d.getFullYear() === period.year;
  });
  const periodExpenses = state.expenses.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() + 1 === period.month && d.getFullYear() === period.year;
  });
  const totalIncome = periodIncome.reduce((s, x) => s + x.amount, 0);
  const totalExpense = periodExpenses.reduce((s, x) => s + x.amount, 0);
  const recurringIncome = periodIncome.filter(x => x.kind === 'recurring').reduce((s, x) => s + x.amount, 0);
  const oneoffIncome = periodIncome.filter(x => x.kind !== 'recurring').reduce((s, x) => s + x.amount, 0);
  const recurringExpense = periodExpenses.filter(x => x.kind === 'recurring').reduce((s, x) => s + x.amount, 0);
  const oneoffExpense = periodExpenses.filter(x => x.kind !== 'recurring').reduce((s, x) => s + x.amount, 0);
  return { periodIncome, periodExpenses, totalIncome, totalExpense,
           recurringIncome, oneoffIncome, recurringExpense, oneoffExpense,
           net: totalIncome - totalExpense };
}

// Aggregates for any month — combines transactions + active rules + debts (virtual)
function aggregateMonth(y, m) {
  const key = monthKey(y, m);
  let income = 0, expense = 0;
  // actual transactions
  state.income.forEach(t => { const d = new Date(t.date); if (d.getMonth()+1===m && d.getFullYear()===y) income += t.amount; });
  state.expenses.forEach(t => { const d = new Date(t.date); if (d.getMonth()+1===m && d.getFullYear()===y) expense += t.amount; });
  return { key, income, expense, net: income - expense };
}

// Forecast aggregator — for future months, use rules and debts; for past/current, use real txs
function projectMonth(y, m, debtTracker) {
  const key = monthKey(y, m);
  const now = new Date();
  const isPastOrCurrent = (y < now.getFullYear()) || (y === now.getFullYear() && m <= now.getMonth() + 1);
  let income = 0, expense = 0;

  if (isPastOrCurrent) {
    // Use actual transactions
    state.income.forEach(t => { const d = new Date(t.date); if (d.getMonth()+1===m && d.getFullYear()===y) income += t.amount; });
    state.expenses.forEach(t => { const d = new Date(t.date); if (d.getMonth()+1===m && d.getFullYear()===y) expense += t.amount; });
  } else {
    // Use rules
    state.rules.forEach(r => {
      const active = key >= r.start_month && (!r.end_month || key <= r.end_month);
      if (active) {
        if (r.type === 'income') income += r.amount;
        else expense += r.amount;
      }
    });
  }

  // Add debt monthly payments as virtual expenses while debt has balance
  // Track remaining per debt across forecast months
  if (debtTracker) {
    Object.keys(debtTracker).forEach(id => {
      const dt = debtTracker[id];
      if (dt.remaining > 0 && dt.monthlyPayment > 0) {
        const pay = Math.min(dt.monthlyPayment, dt.remaining);
        expense += pay;
        dt.remaining = Math.max(0, dt.remaining - pay);
      }
    });
  }
  return { key, income, expense, net: income - expense };
}

function buildForecast(monthsBack, monthsForward) {
  const now = new Date();
  const series = [];
  // initial debt tracker (only used for forward months)
  const debtTracker = {};
  state.debts.forEach(d => {
    debtTracker[d.id] = { remaining: Math.max(0, d.original - d.paid), monthlyPayment: d.monthlyPayment || 0 };
  });

  // back months: don't deplete debts (use real txs)
  for (let i = monthsBack; i > 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    series.push(projectMonth(d.getFullYear(), d.getMonth() + 1, null));
  }
  // current + forward: use debt tracker for forward months only
  // current month: real txs, but ALSO add debt payment if scheduled? — Brief: debt acts as virtual recurring,
  // so for non-past, include it. For current month, the user may have already paid; safest is forward-only.
  // Per brief: "until the debt is paid off" — apply to all forecast (forward) months.
  const currentKey = monthKey(now.getFullYear(), now.getMonth() + 1);
  for (let i = 0; i <= monthsForward; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const k = monthKey(d.getFullYear(), d.getMonth() + 1);
    // For the current month, use real txs (don't add virtual debt — user might've already logged it)
    // For future months, use rules + debt tracker
    if (k === currentKey) {
      series.push(projectMonth(d.getFullYear(), d.getMonth() + 1, null));
    } else {
      series.push(projectMonth(d.getFullYear(), d.getMonth() + 1, debtTracker));
    }
  }
  return series;
}

/* ============================================================
   CHART RENDERING — premium SVG with bezier, gradient, hover
   ============================================================ */
function catmullRomToBezier(points) {
  // Returns SVG path d-string with cubic bezier segments interpolating through points
  if (points.length === 0) return '';
  if (points.length === 1) return `M ${points[0].x},${points[0].y}`;
  let d = `M ${points[0].x},${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i - 1] || points[i];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[i + 2] || p2;
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
  }
  return d;
}

function renderChart() {
  // Zoom window: how many months back vs forward
  // For 3M: 1 back + current + 1 forward
  // For 6M: 2 back + current + 3 forward
  // For 12M: 3 back + current + 8 forward
  // For 24M: 6 back + current + 17 forward
  const backCount = chartZoom === 3 ? 1 : chartZoom === 6 ? 2 : chartZoom === 12 ? 3 : 6;
  const forwardCount = chartZoom - backCount - 1;
  const series = buildForecast(backCount, forwardCount);

  // Compute running balance: starts at sum of investments minus debts as a rough "cash" baseline
  // For chart purposes we show running net flow
  const totalInvest = state.investments.reduce((s, i) => s + (i.balance || 0), 0);
  let running = totalInvest;
  series.forEach(s => { s.runningBalance = running + s.net; running = s.runningBalance; });

  const now = new Date();
  const currentKey = monthKey(now.getFullYear(), now.getMonth() + 1);

  // SVG dims
  const w = 1000, h = 360;
  const pad = { top: 20, right: 50, bottom: 36, left: 20 };
  const innerW = w - pad.left - pad.right;
  const innerH = h - pad.top - pad.bottom;

  // Y domain
  const allVals = series.flatMap(s => [s.income, s.expense]).concat(chartMode === 'line' ? series.map(s => s.net) : []);
  const minY = Math.min(0, ...allVals);
  const maxY = Math.max(0, ...allVals);
  const yRange = maxY - minY || 1;
  const yPad = yRange * 0.1;
  const yMin = minY - yPad;
  const yMax = maxY + yPad;

  function xFor(i) { return pad.left + (series.length === 1 ? innerW / 2 : (i * innerW / (series.length - 1))); }
  function yFor(v) { return pad.top + innerH - ((v - yMin) / (yMax - yMin)) * innerH; }

  // Y axis ticks
  const tickCount = 4;
  const ticks = [];
  for (let i = 0; i <= tickCount; i++) {
    const v = yMin + (yMax - yMin) * (i / tickCount);
    ticks.push({ v, y: yFor(v) });
  }

  // SVG content
  let svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`;
  // defs: gradients + shadow
  svg += `<defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="incBarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="expBarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="lineShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="barShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  // grid lines (dashed, 20% opacity)
  ticks.forEach(t => {
    svg += `<line x1="${pad.left}" y1="${t.y}" x2="${w - pad.right}" y2="${t.y}"
      stroke="var(--ink)" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3 4"/>`;
  });
  // zero line emphasized
  if (yMin < 0 && yMax > 0) {
    svg += `<line x1="${pad.left}" y1="${yFor(0)}" x2="${w - pad.right}" y2="${yFor(0)}"
      stroke="var(--ink)" stroke-opacity="0.25" stroke-width="1"/>`;
  }

  // Y axis labels (right-aligned)
  ticks.forEach(t => {
    svg += `<text x="${w - pad.right + 8}" y="${t.y + 4}" font-size="11"
      fill="var(--ink-muted)" font-family="JetBrains Mono, monospace"
      style="font-variant-numeric: tabular-nums">${fmtBig(t.v)}</text>`;
  });

  if (chartMode === 'line') {
    // Area + line based on running balance OR net? Brief says month name, income, expense, net, running balance.
    // We'll plot NET as the main line for clearer visualization
    const points = series.map((s, i) => ({ x: xFor(i), y: yFor(s.net) }));
    const linePath = catmullRomToBezier(points);
    // area path closes at zero baseline
    const zeroY = yFor(Math.max(yMin, 0));
    const areaPath = linePath + ` L ${points[points.length - 1].x},${zeroY} L ${points[0].x},${zeroY} Z`;
    // Draw area
    svg += `<path d="${areaPath}" fill="url(#areaGrad)"/>`;
    // Draw line w/ shadow + animated draw
    svg += `<path id="chartLine" d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round" filter="url(#lineShadow)"
      pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
      <animate attributeName="stroke-dashoffset" from="1" to="0" dur="0.8s" begin="0s" fill="freeze"
        keySplines="0.16 1 0.3 1" calcMode="spline" keyTimes="0;1"/>
    </path>`;
    // Dots
    points.forEach((p, i) => {
      const isHover = i === hoveredChartIdx;
      svg += `<circle cx="${p.x}" cy="${p.y}" r="${isHover ? 6 : 3.5}"
        fill="var(--accent)" stroke="var(--surface)" stroke-width="2"
        style="transition: r 0.15s"/>`;
    });
  } else {
    // Bar chart: paired bars (income green, expense red)
    const groupGap = 8;
    const barGap = 4;
    const groupWidth = (innerW / series.length) - groupGap;
    const barWidth = Math.max(4, (groupWidth - barGap) / 2);
    series.forEach((s, i) => {
      const cx = xFor(i);
      const groupLeft = cx - groupWidth / 2;
      const incX = groupLeft;
      const expX = groupLeft + barWidth + barGap;
      const zeroY = yFor(0);
      const incY = yFor(s.income);
      const expY = yFor(s.expense);
      const incH = Math.max(0, zeroY - incY);
      const expH = Math.max(0, zeroY - expY);
      const isHover = i === hoveredChartIdx;
      const lift = isHover ? -4 : 0;
      // rounded top corners via rx/ry
      svg += `<rect x="${incX}" y="${incY + lift}" width="${barWidth}" height="${incH}"
        rx="3" fill="url(#incBarGrad)" ${isHover ? 'filter="url(#barShadow)"' : ''}
        style="transition: y 0.15s">
        <animate attributeName="height" from="0" to="${incH}" dur="0.6s" fill="freeze"
          keySplines="0.16 1 0.3 1" calcMode="spline" keyTimes="0;1"/>
        <animate attributeName="y" from="${zeroY}" to="${incY + lift}" dur="0.6s" fill="freeze"
          keySplines="0.16 1 0.3 1" calcMode="spline" keyTimes="0;1"/>
      </rect>`;
      svg += `<rect x="${expX}" y="${expY + lift}" width="${barWidth}" height="${expH}"
        rx="3" fill="url(#expBarGrad)" ${isHover ? 'filter="url(#barShadow)"' : ''}
        style="transition: y 0.15s">
        <animate attributeName="height" from="0" to="${expH}" dur="0.6s" fill="freeze"
          keySplines="0.16 1 0.3 1" calcMode="spline" keyTimes="0;1"/>
        <animate attributeName="y" from="${zeroY}" to="${expY + lift}" dur="0.6s" fill="freeze"
          keySplines="0.16 1 0.3 1" calcMode="spline" keyTimes="0;1"/>
      </rect>`;
    });
  }

  // X axis labels
  series.forEach((s, i) => {
    const x = xFor(i);
    const [yy, mm] = s.key.split('-');
    const isCurrent = s.key === currentKey;
    svg += `<text x="${x}" y="${h - pad.bottom + 18}" font-size="11" text-anchor="middle"
      fill="${isCurrent ? 'var(--accent)' : 'var(--ink-muted)'}"
      font-weight="${isCurrent ? '700' : '500'}"
      font-family="Inter, sans-serif">${MONTHS_SHORT[parseInt(mm) - 1]}</text>`;
    if (parseInt(mm) === 1 || i === 0) {
      svg += `<text x="${x}" y="${h - pad.bottom + 32}" font-size="9" text-anchor="middle"
        fill="var(--ink-muted)" opacity="0.6" font-family="JetBrains Mono, monospace">${yy}</text>`;
    }
  });

  // Hover hit zones + vertical guideline
  if (hoveredChartIdx >= 0 && hoveredChartIdx < series.length) {
    const hx = xFor(hoveredChartIdx);
    svg += `<line x1="${hx}" y1="${pad.top}" x2="${hx}" y2="${h - pad.bottom}"
      stroke="var(--ink)" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3 3"/>`;
  }
  series.forEach((s, i) => {
    const x = xFor(i);
    const segW = innerW / series.length;
    svg += `<rect x="${x - segW/2}" y="${pad.top}" width="${segW}" height="${innerH}"
      fill="transparent" data-chart-idx="${i}" style="cursor: pointer"/>`;
  });

  svg += `</svg>`;
  // Tooltip
  const tooltipData = hoveredChartIdx >= 0 ? series[hoveredChartIdx] : null;
  const tooltipHtml = tooltipData ? (() => {
    const [yy, mm] = tooltipData.key.split('-');
    return `<div class="tt-month">${MONTHS[parseInt(mm) - 1]} ${yy}</div>
      <div class="tt-row"><span>Gelir</span><strong style="color: var(--positive)">${fmt(tooltipData.income)}</strong></div>
      <div class="tt-row"><span>Gider</span><strong style="color: var(--negative)">${fmt(tooltipData.expense)}</strong></div>
      <div class="tt-row"><span>Net</span><strong style="color: ${tooltipData.net >= 0 ? 'var(--positive)' : 'var(--negative)'}">${fmtSigned(tooltipData.net)}</strong></div>
      <div class="tt-row"><span>Bakiye</span><strong>${fmt(tooltipData.runningBalance)}</strong></div>`;
  })() : '';

  return { svg, tooltipHtml, series };
}


/* ============================================================
   INSIGHTS — auto-generated cards
   ============================================================ */
function computeInsights() {
  const now = new Date();
  const curKey = monthKey(now.getFullYear(), now.getMonth() + 1);
  const prevDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const prevKey = monthKey(prevDate.getFullYear(), prevDate.getMonth() + 1);

  // Current month aggregates
  const cur = aggregateMonth(now.getFullYear(), now.getMonth() + 1);
  const prev = aggregateMonth(prevDate.getFullYear(), prevDate.getMonth() + 1);

  const insights = [];

  // BURN RATE — only if expenses > income AND we have investment balance
  const totalInvest = state.investments.reduce((s, i) => s + (i.balance || 0), 0);
  if (cur.expense > cur.income && totalInvest > 0 && (cur.expense - cur.income) > 0) {
    const monthlyBurn = cur.expense - cur.income;
    const months = totalInvest / monthlyBurn;
    if (isFinite(months) && months < 1000) {
      insights.push({
        emoji: '🔥', label: 'Burn rate',
        value: months.toFixed(1) + ' ay',
        sub: fmt(monthlyBurn) + '/ay yakıyorsun'
      });
    }
  }

  // MRR GROWTH — recurring income rules sum month over month, but we need realized recurring transactions
  const curRecurringInc = state.income.filter(t => {
    const d = new Date(t.date);
    return monthKey(d.getFullYear(), d.getMonth() + 1) === curKey && t.kind === 'recurring';
  }).reduce((s, x) => s + x.amount, 0);
  const prevRecurringInc = state.income.filter(t => {
    const d = new Date(t.date);
    return monthKey(d.getFullYear(), d.getMonth() + 1) === prevKey && t.kind === 'recurring';
  }).reduce((s, x) => s + x.amount, 0);
  if (curRecurringInc > 0 || prevRecurringInc > 0) {
    let pct = 0;
    let display;
    if (prevRecurringInc === 0) {
      display = 'Yeni';
    } else {
      pct = (curRecurringInc - prevRecurringInc) / prevRecurringInc * 100;
      display = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
    }
    insights.push({
      emoji: '📈', label: 'MRR büyümesi',
      value: display,
      sub: fmt(curRecurringInc) + ' bu ay',
      color: pct >= 0 ? 'var(--positive)' : 'var(--negative)'
    });
  }

  // SAVINGS RATE — net / income
  if (cur.income > 0) {
    const rate = (cur.net / cur.income) * 100;
    insights.push({
      emoji: '💰', label: 'Tasarruf oranı',
      value: rate.toFixed(0) + '%',
      sub: fmt(cur.net) + ' net',
      color: rate >= 0 ? 'var(--positive)' : 'var(--negative)'
    });
  }

  // LARGEST EXPENSE CATEGORY
  if (cur.expense > 0) {
    const catTotals = {};
    state.expenses.forEach(e => {
      const d = new Date(e.date);
      if (monthKey(d.getFullYear(), d.getMonth() + 1) === curKey) {
        catTotals[e.category] = (catTotals[e.category] || 0) + e.amount;
      }
    });
    const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    if (sorted.length > 0) {
      const [topCat, topAmt] = sorted[0];
      const prevCatTotals = {};
      state.expenses.forEach(e => {
        const d = new Date(e.date);
        if (monthKey(d.getFullYear(), d.getMonth() + 1) === prevKey) {
          prevCatTotals[e.category] = (prevCatTotals[e.category] || 0) + e.amount;
        }
      });
      const prevAmt = prevCatTotals[topCat] || 0;
      const delta = topAmt - prevAmt;
      const deltaStr = prevAmt === 0 ? 'yeni' :
        (delta >= 0 ? '+' : '') + ((delta / prevAmt) * 100).toFixed(0) + '%';
      insights.push({
        emoji: '⚠️', label: 'En büyük gider',
        value: fmtBig(topAmt),
        sub: topCat + ' · ' + deltaStr + ' vs geçen ay'
      });
    }
  }

  return insights;
}

function shouldShowOnboarding() {
  if (onboardDismissed) return false;
  return state.rules.length === 0 && state.income.length === 0 &&
         state.expenses.length === 0 && state.debts.length === 0 &&
         state.investments.length === 0;
}
function onboardSteps() {
  return [
    { key: 'invest', title: 'Mevcut bakiye', desc: 'Banka/birikim hesabını ekle', done: state.investments.length > 0 },
    { key: 'mrr', title: 'Tekrarlayan gelir', desc: 'Maaş veya MRR kuralı ekle', done: state.rules.filter(r=>r.type==='income').length > 0 || state.income.filter(i=>i.kind==='recurring').length > 0 },
    { key: 'fixed', title: 'Sabit giderler', desc: 'Kira, abonelikler vs.', done: state.rules.filter(r=>r.type==='expense').length > 0 || state.expenses.filter(e=>e.kind==='recurring').length > 0 },
  ];
}

/* ============================================================
   SUNDAY BANNER STATE
   ============================================================ */
function sundayBannerData() {
  const now = new Date();
  const isSunday = now.getDay() === 0;
  // Find oldest unlocked past month with transactions
  const txMonths = new Set();
  [...state.income, ...state.expenses].forEach(t => {
    const d = new Date(t.date);
    const k = monthKey(d.getFullYear(), d.getMonth() + 1);
    txMonths.add(k);
  });
  const curKey = monthKey(now.getFullYear(), now.getMonth() + 1);
  const unlocked = [...txMonths]
    .filter(k => k !== curKey && k < curKey && !state.locked.includes(k))
    .sort();
  // count this week's transactions
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const weekTx = [...state.income, ...state.expenses].filter(t => {
    return new Date(t.date) >= weekAgo;
  }).length;
  // Show if sunday OR if there are unlocked past months
  if (!isSunday && unlocked.length === 0) return null;
  return { isSunday, unlockedMonths: unlocked, weekTx };
}

          <div class="onboard-step-desc">${escapeHtml(s.desc)}</div>
        </button>`).join('')}

}

function renderSundayBanner(d) {
  const oldest = d.unlockedMonths[0];
  const oldestLabel = oldest ? (() => {
    const [y, m] = oldest.split('-');
    return MONTHS[parseInt(m) - 1] + ' ' + y;
  })() : null;
  return `<div class="sunday-banner">
    <div class="sunday-content">
      <div class="sunday-title">📅 ${d.isSunday ? 'Pazar günü — haftalık güncelleme zamanı' : 'Geçen ayları kapatmayı unutma'}</div>
      <div class="sunday-stats">
        ${d.weekTx > 0 ? `Bu hafta <strong>${d.weekTx}</strong> yeni işlem · ` : ''}
        ${oldestLabel ? `<strong>${oldestLabel}</strong> hâlâ açık` : 'Tüm aylar kapalı 🎉'}
      </div>
      ${d.unlockedMonths.length > 1 ? `<div class="sunday-progress">${d.unlockedMonths.slice(0, 8).map((m, i) => `<div class="sunday-progress-dot ${i === 0 ? 'current' : ''}"></div>`).join('')}</div>` : ''}
    </div>
    ${oldest ? `<button class="primary-btn" data-action="lock-month" data-key="${oldest}">${icons.lock}<span>${oldestLabel} kilitle</span></button>` : ''}
  </div>`;
}

function renderCategoryBreakdown(title, data, total, color, barColor) {
  const entries = Object.entries(data).filter(([_, v]) => v.total > 0).sort((a, b) => b[1].total - a[1].total);
  const max = Math.max(...entries.map(e => e[1].total), 1);
  return `<div class="section" style="margin-bottom:0">
    <div class="section-header"><h2 class="section-title">${title}</h2></div>
    <div class="category-list">${entries.length === 0
      ? `<div class="empty-state" style="padding: 30px 20px"><div style="font-size:13px">Bu ay için veri yok</div></div>`
      : entries.map(([cat, val]) => {
        const pct = total > 0 ? (val.total / total * 100) : 0;
        const barPct = (val.total / max * 100);
        return `<div class="category-row">
          <div class="category-top">
            <span class="category-name">${escapeHtml(cat)}${val.oneoff > 0 && val.recurring > 0 ? `<span class="badge badge-extra" style="font-size:10px; padding:2px 6px">${fmt(val.oneoff)} tek seferlik</span>` : ''}</span>
            <div><span class="category-amount" style="color:${color}">${fmt(val.total)}</span><span class="category-pct">${pct.toFixed(1)}%</span></div>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${barPct}%; background:${barColor}; opacity: 0.85"></div></div>
        </div>`;
      }).join('')}</div></div>`;
}


/* ============================================================
   LIST PAGES (income / expense)
   ============================================================ */
function renderList(kind) {
  const isIncome = kind === 'income';
  const items = isIncome ? state.income : state.expenses;

  else if (listFilter === 'oneoff') filtered = items.filter(x => x.kind !== 'recurring');
  const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));
  const allTotal = items.reduce((s, x) => s + x.amount, 0);
  const recurringTotal = items.filter(x => x.kind === 'recurring').reduce((s, x) => s + x.amount, 0);
  const oneoffTotal = items.filter(x => x.kind !== 'recurring').reduce((s, x) => s + x.amount, 0);
  const accent = isIncome ? 'var(--positive)' : 'var(--negative)';
  const title = isIncome ? 'Gelirler' : 'Giderler';

  return `<div class="content">
    <div class="list-header">
      <div>
        <h1 class="page-title">${title}</h1>
        <div class="page-subtitle">
          ${items.length} kayıt · Toplam <span style="color:${accent}; font-weight:600; font-family: var(--mono)">${fmt(allTotal)}</span>
          · Tekrarlayan <span class="mono" style="font-weight:600">${fmt(recurringTotal)}</span>
          · Tek seferlik <span class="mono" style="font-weight:600">${fmt(oneoffTotal)}</span>
        </div>
      </div>
      <button class="primary-btn" data-action="${isIncome ? 'add-income' : 'add-expense'}">${icons.plusBig}<span>${isIncome ? 'Gelir Ekle' : 'Gider Ekle'}</span></button>
    </div>
    <div class="filter-row">
      <button class="filter-pill ${listFilter === 'all' ? 'active' : ''}" data-filter="all">Tümü (${items.length})</button>
      <button class="filter-pill ${listFilter === 'recurring' ? 'active' : ''}" data-filter="recurring">Tekrarlayan (${items.filter(x => x.kind === 'recurring').length})</button>
      <button class="filter-pill ${listFilter === 'oneoff' ? 'active' : ''}" data-filter="oneoff">Tek seferlik (${items.filter(x => x.kind !== 'recurring').length})</button>
    </div>

      <div class="activity-header">
        <div style="flex:1">Tarih</div>
        <div style="flex:0.7">Tip</div>
        <div style="flex:2">Açıklama</div>
        <div style="flex:1.2">Kategori</div>
        <div style="flex:1; text-align:right">Tutar</div>
        <div style="width:80px"></div>
      </div>
      ${sorted.length === 0
        ? renderEmpty(icons.emptyList, 'Bu filtrede kayıt yok', items.length === 0 ? 'İlk kaydını ekleyerek başla.' : 'Filtreyi değiştirmeyi dene.', isIncome ? 'add-income' : 'add-expense', isIncome ? 'Gelir Ekle' : 'Gider Ekle')
        : sorted.map(item => `<div class="activity-row">
          <div style="flex:1"><span class="mobile-card-label only-mobile">Tarih</span><span class="mono">${item.date.split('-').reverse().join('/')}</span></div>
          <div style="flex:0.7"><span class="badge ${item.kind === 'recurring' ? 'badge-regular' : 'badge-extra'}">${item.kind === 'recurring' ? 'Tekrarlayan' : 'Tek seferlik'}</span></div>
          <div style="flex:2"><div style="color: var(--ink); font-weight:500">${escapeHtml(item.description)}</div>${item.notes ? `<div style="font-size:12px; color: var(--ink-muted); margin-top:2px">${escapeHtml(item.notes)}</div>` : ''}</div>

function attachAuthEvents() {
  document.querySelectorAll('[data-action="switch-auth"]').forEach(el => {
    el.addEventListener('click', () => {
      authMode = authMode === 'login' ? 'register' : 'login';
      authError = '';
      render();
    });
  });
}

async function submitAuth() {
  const form = document.getElementById('auth-form');
  if (!form) return;
  const obj = Object.fromEntries(new FormData(form).entries());
  authLoading = true; authError = ''; render();
  try {
    if (authMode === 'register') {
      if (!obj.fullName || !obj.email || !obj.password) throw new Error('Tüm alanları doldur.');
      const signUpResult = await signUp(obj.email, obj.password, obj.fullName);
      if (signUpResult && signUpResult.session) {
        session = signUpResult.session;
      } else {
        try {
          const signInResult = await signIn(obj.email, obj.password);
          session = signInResult && signInResult.session ? signInResult.session : null;
        } catch (e) { /* may need email confirmation */ }
      }
    } else {
      const signInResult = await signIn(obj.email, obj.password);
      session = signInResult && signInResult.session ? signInResult.session : null;
    }
    if (!session) {
      const { data: { session: existing } } = await sb.auth.getSession();
      session = existing;
    }
    if (!session) throw new Error('Oturum başlatılamadı. Email doğrulaması gerekiyor olabilir.');
    isLoading = true; render();
    await loadAllData();
    isLoading = false; authLoading = false; render();
  } catch (e) {
    authError = e.message || 'Bir hata oluştu.';
    authLoading = false; render();
  }
}

function attachChartHover() {
  const wrap = document.getElementById('chart-wrap');
  if (!wrap) return;
  const svg = wrap.querySelector('svg');
  if (!svg) return;
  // Use the data-chart-idx rects for hover
  svg.querySelectorAll('[data-chart-idx]').forEach(r => {
    r.addEventListener('mouseenter', (e) => {
      const idx = parseInt(r.dataset.chartIdx);
      if (idx === hoveredChartIdx) return;
      hoveredChartIdx = idx;
      // Just re-render the chart svg + tooltip (not full page)
      updateChartOnly();
    });
  });
  wrap.addEventListener('mouseleave', () => {
    if (hoveredChartIdx !== -1) { hoveredChartIdx = -1; updateChartOnly(); }
  });
  wrap.addEventListener('mousemove', (e) => {
    const tt = document.getElementById('chart-tooltip');
    if (!tt || hoveredChartIdx < 0) return;
    const rect = wrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const ttW = tt.offsetWidth || 220;
    const left = Math.min(Math.max(8, x - ttW/2), rect.width - ttW - 8);
    tt.style.left = left + 'px';
    tt.style.top = Math.max(8, y - tt.offsetHeight - 12) + 'px';
  });
}

function updateChartOnly() {
  const wrap = document.getElementById('chart-wrap');
  if (!wrap) return;
  const chart = renderChart();
  wrap.innerHTML = chart.svg + `<div class="chart-tooltip ${hoveredChartIdx >= 0 ? 'visible' : ''}" id="chart-tooltip">${chart.tooltipHtml}</div>`;
  attachChartHover();
}

    el.addEventListener('click', () => { listFilter = el.dataset.filter; render(); });
  });

  });
  document.querySelectorAll('[data-chart-zoom]').forEach(el => {
    el.addEventListener('click', () => { chartZoom = parseInt(el.dataset.chartZoom); hoveredChartIdx = -1; render(); });
  });
  document.querySelectorAll('[data-toggle-kind]').forEach(el => {
    el.addEventListener('click', () => {

  });
  document.querySelectorAll('[data-stop-propagation]').forEach(el => {
    el.addEventListener('click', (e) => e.stopPropagation());
  });
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', async (e) => {
      const action = el.dataset.action;
      const id = el.dataset.id;
      if (action === 'open-create') { modal = { type: 'createMenu' }; modalErrors = {}; render(); }
      else if (action === 'add-income') { modal = { type: 'income' }; modalErrors = {}; render(); }
      else if (action === 'add-expense') { modal = { type: 'expense' }; modalErrors = {}; render(); }
      else if (action === 'add-rule') { modal = { type: 'rule' }; modalErrors = {}; render(); }
      else if (action === 'add-rule-income') { modal = { type: 'rule', preset: 'income' }; modalErrors = {}; render(); }
      else if (action === 'add-rule-expense') { modal = { type: 'rule', preset: 'expense' }; modalErrors = {}; render(); }
      else if (action === 'add-debt') { modal = { type: 'debt' }; modalErrors = {}; render(); }
      else if (action === 'add-investment') { modal = { type: 'investment' }; modalErrors = {}; render(); }
      else if (action === 'onboard-invest') { modal = { type: 'investment', presetName: 'Cash Savings', presetType: 'Cash Savings' }; modalErrors = {}; render(); }
      else if (action === 'onboard-mrr') { modal = { type: 'rule', preset: 'income' }; modalErrors = {}; render(); }
      else if (action === 'onboard-fixed') { modal = { type: 'rule', preset: 'expense' }; modalErrors = {}; render(); }
      else if (action === 'dismiss-onboard') {
        onboardDismissed = true;
        localStorage.setItem('eralean-onboard-dismissed', '1');
        render();
      }
      else if (action === 'edit-income') { modal = { type: 'income', item: state.income.find(x => x.id === id) }; modalErrors = {}; render(); }
      else if (action === 'edit-expense') { modal = { type: 'expense', item: state.expenses.find(x => x.id === id) }; modalErrors = {}; render(); }
      else if (action === 'edit-rule') { const r = state.rules.find(x => x.id === id); modal = { type: 'rule', item: r }; modalErrors = {}; render(); }
      else if (action === 'edit-debt') { modal = { type: 'debt', item: state.debts.find(x => x.id === id) }; modalErrors = {}; render(); }
      else if (action === 'edit-investment') { modal = { type: 'investment', item: state.investments.find(x => x.id === id) }; modalErrors = {}; render(); }
      else if (action === 'delete-income' || action === 'delete-expense') {
        if (confirm('Bu kaydı silmek istediğine emin misin?')) {
          try {
            await deleteRow('transactions', id);
            if (action === 'delete-income') state.income = state.income.filter(x => x.id !== id);
            else state.expenses = state.expenses.filter(x => x.id !== id);
            showToast('✓ Silindi'); render();
          } catch (err) { showToast('Silinemedi: ' + err.message, true); }
        }
      }
      else if (action === 'delete-rule') {
        if (confirm('Bu kuralı silmek istediğine emin misin? Geçmiş işlemler etkilenmez.')) {
          try { await deleteRow('recurring_rules', id); state.rules = state.rules.filter(x => x.id !== id); showToast('✓ Silindi'); render(); }
          catch (err) { showToast('Silinemedi: ' + err.message, true); }
        }
      }
      else if (action === 'delete-debt') {
        if (confirm('Bu borcu silmek istediğine emin misin?')) {
          try { await deleteRow('debts', id); state.debts = state.debts.filter(x => x.id !== id); showToast('✓ Silindi'); render(); }
          catch (err) { showToast('Silinemedi: ' + err.message, true); }
        }
      }
      else if (action === 'delete-investment') {
        if (confirm('Bu hesabı silmek istediğine emin misin?')) {
          try { await deleteRow('investments', id); state.investments = state.investments.filter(x => x.id !== id); showToast('✓ Silindi'); render(); }
          catch (err) { showToast('Silinemedi: ' + err.message, true); }
        }
      }
      else if (action === 'lock-month') {
        const key = el.dataset.key;
        if (confirm(`${key} ayını kilitlemek istediğine emin misin? Bu işlemden sonra bu aya geçmişe dönük değişiklik yapmamak için bir hatırlatıcı olarak kullanılır.`)) {
          try { await lockMonth(key); showToast('✓ Ay kilitlendi'); render(); }
          catch (err) { showToast('Kilitlenemedi: ' + err.message, true); }
        }
      }
      else if (action === 'close-modal') { modal = null; modalErrors = {}; render(); }
      else if (action === 'save-modal') { saveModal(); }
      else if (action === 'toggle-avatar-menu') { e.stopPropagation(); avatarMenuOpen = !avatarMenuOpen; render(); }
      else if (action === 'toggle-theme') {
        theme = theme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('eralean-theme', theme);
        document.documentElement.setAttribute('data-theme', theme);
        render();
      }
      else if (action === 'open-profile') { view = 'profile'; avatarMenuOpen = false; render(); }
      else if (action === 'logout') { await signOut(); }
    });
  });
  if (avatarMenuOpen) {
    setTimeout(() => { document.addEventListener('click', closeAvatarMenuOnOutside, { once: true }); }, 0);
  }
}

function closeAvatarMenuOnOutside(e) {
  if (!e.target.closest('.avatar-menu') && !e.target.closest('[data-action="toggle-avatar-menu"]')) {
    avatarMenuOpen = false; render();
  }
}

/* ============================================================
   SAVE LOGIC (with inline validation)
   ============================================================ */
async function saveModal() {
  const form = document.getElementById('modal-form');
  if (!form) return;
  const obj = Object.fromEntries(new FormData(form).entries());
  const { type, item } = modal;
  modalErrors = {};

  // Inline validation
  if (type === 'income' || type === 'expense') {
    if (!obj.description || !obj.description.trim()) modalErrors.description = 'Açıklama gerekli';
    if (!obj.date) modalErrors.date = 'Tarih gerekli';
    if (!obj.amount || parseFloat(obj.amount) <= 0) modalErrors.amount = 'Geçerli bir tutar gir';
  } else if (type === 'rule') {
    if (!obj.description || !obj.description.trim()) modalErrors.description = 'Açıklama gerekli';
    if (!obj.amount || parseFloat(obj.amount) <= 0) modalErrors.amount = 'Geçerli bir tutar gir';
  } else if (type === 'debt') {
    if (!obj.name || !obj.name.trim()) modalErrors.name = 'Borç adı gerekli';
    if (!obj.original || parseFloat(obj.original) <= 0) modalErrors.original = 'Geçerli bir tutar gir';
  } else if (type === 'investment') {
    if (!obj.name || !obj.name.trim()) modalErrors.name = 'Hesap adı gerekli';
    if (obj.contributed === '' || parseFloat(obj.contributed) < 0) modalErrors.contributed = 'Geçerli bir tutar gir';
    if (obj.balance === '' || parseFloat(obj.balance) < 0) modalErrors.balance = 'Geçerli bir tutar gir';
  }
  if (Object.keys(modalErrors).length > 0) { render(); return; }

  try {
    if (type === 'income' || type === 'expense') {
      const newItem = {
        date: obj.date,
        description: obj.description.trim(),
        category: obj.category,
        amount: parseFloat(obj.amount) || 0,
        kind: obj.kind || 'oneoff',
        notes: (obj.notes || '').trim(),
      };
      const saved = await saveTransaction(newItem, type, item ? item.id : null);
      if (type === 'income') {
        state.income = item ? state.income.map(x => x.id === item.id ? saved : x) : [saved, ...state.income];
      } else {
        state.expenses = item ? state.expenses.map(x => x.id === item.id ? saved : x) : [saved, ...state.expenses];
      }
    } else if (type === 'rule') {
      const newItem = {
        type: obj.type,
        description: obj.description.trim(),
        category: obj.category,
        amount: parseFloat(obj.amount) || 0,
        start_month: obj.start_month,
        end_month: obj.end_month || null,
        notes: (obj.notes || '').trim(),
      };
      const saved = await saveRule(newItem, item ? item.id : null);
      state.rules = item ? state.rules.map(x => x.id === item.id ? saved : x) : [saved, ...state.rules];
    } else if (type === 'debt') {
      const newItem = {
        name: obj.name.trim(),
        creditor: (obj.creditor || '').trim(),
        original: parseFloat(obj.original) || 0,
        paid: parseFloat(obj.paid) || 0,
        monthlyPayment: parseFloat(obj.monthlyPayment) || 0,
        notes: (obj.notes || '').trim(),
      };
      const saved = await saveDebt(newItem, item ? item.id : null);
      state.debts = item ? state.debts.map(x => x.id === item.id ? saved : x) : [saved, ...state.debts];
    } else if (type === 'investment') {
      const newItem = {
        name: obj.name.trim(),
        type: obj.type,
        contributed: parseFloat(obj.contributed) || 0,
        balance: parseFloat(obj.balance) || 0,
        notes: (obj.notes || '').trim(),
      };
      const saved = await saveInvestment(newItem, item ? item.id : null);
      state.investments = item ? state.investments.map(x => x.id === item.id ? saved : x) : [saved, ...state.investments];
    }
    showToast('✓ Kaydedildi');
    modal = null; modalErrors = {};
    render();
  } catch (e) {
    showToast('Kaydedilemedi: ' + e.message, true);
  }
}

async function saveProfile() {
  const form = document.getElementById('profile-form');
  if (!form) return;
  const obj = Object.fromEntries(new FormData(form).entries());
  try {
    const { data, error } = await sb.from('profiles').upsert({ id: session.user.id, full_name: obj.fullName || null }).select().single();
    if (error) throw error;
    profile = data;
    showToast('✓ Profil güncellendi');
    render();
  } catch (e) {
    showToast('Güncellenemedi: ' + e.message, true);
  }
}

window.submitAuth = submitAuth;
window.saveModal = saveModal;
window.saveProfile = saveProfile;

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener('keydown', (e) => {
  // Don't trigger if typing in input/textarea
  const tag = (e.target.tagName || '').toLowerCase();
  if (['input', 'textarea', 'select'].includes(tag)) {
    if (e.key === 'Escape' && modal) { modal = null; modalErrors = {}; render(); }
    return;
  }
  if (!session) return;
  if (e.key === 'Escape') {
    if (modal) { modal = null; modalErrors = {}; render(); }
    else if (avatarMenuOpen) { avatarMenuOpen = false; render(); }
  } else if (e.key === 'n' || e.key === 'N') {
    if (!modal) { modal = { type: 'createMenu' }; modalErrors = {}; render(); e.preventDefault(); }
  } else if (['1','2','3','4','5'].includes(e.key) && !modal) {
    const map = { '1': 'home', '2': 'forecast', '3': 'income', '4': 'expenses', '5': 'rules' };
    if (map[e.key]) { view = map[e.key]; render(); e.preventDefault(); }
  }
});

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  const { data: { session: existingSession } } = await sb.auth.getSession();
  session = existingSession;
  if (session) await loadAllData();
  isLoading = false;
  render();
  sb.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') {
      session = null; profile = null;
      state = { income: [], expenses: [], debts: [], investments: [], rules: [], locked: [] };
      render();
    }
  });
}
init();
</script>
